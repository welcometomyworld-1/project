<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartCourt AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full mb-4">
                <i class="fas fa-balance-scale text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">NyayaFlow Login</h1>
            <p class="text-slate-500 mt-2">Professional Judicial Management System</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="username" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" placeholder="Enter your username" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none transition" placeholder="••••••••" required>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600">
                    <input type="checkbox" class="mr-2 rounded border-slate-300 text-indigo-600"> Remember me
                </label>
                <a href="#" class="text-indigo-600 hover:text-indigo-500 font-medium">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all flex items-center justify-center">
                <span id="btnText">Sign In</span>
                <i id="btnIcon" class="fas fa-arrow-right ml-2"></i>
            </button>
        </form>

        <div class="mt-10 text-center text-sm text-slate-600">
            Don't have an account? 
            <a href="register.html" class="text-indigo-600 hover:text-indigo-500 font-bold">Create Account</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback
            loginBtn.disabled = true;
            btnText.textContent = 'Authenticating...';
            btnIcon.className = 'fas fa-spinner fa-spin ml-2';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    // Save user data
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    btnText.textContent = 'Success!';
                    btnIcon.className = 'fas fa-check ml-2';
                    loginBtn.className = 'w-full bg-emerald-600 text-white py-3 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center';

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    throw new Error(result.error || 'Login failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Login Error: ' + error.message);
                loginBtn.disabled = false;
                btnText.textContent = 'Sign In';
                btnIcon.className = 'fas fa-arrow-right ml-2';
            }
        });
    </script>
</body>
</html>
