<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Management - SmartCourt AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block">
            <div class="flex items-center mb-8 space-x-2">
                <i class="fas fa-balance-scale text-2xl text-indigo-400"></i>
                <h1 class="text-xl font-bold tracking-tight">NyayaFlow AI</h1>
            </div>
            <nav class="space-y-4">
                <a href="index.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="cases.html" class="flex items-center space-x-3 p-3 bg-indigo-600 rounded-lg">
                    <i class="fas fa-folder"></i>
                    <span>Case Management</span>
                </a>
                <div id="lawyer-only-nav" class="hidden">
                    <a href="add-case.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                        <i class="fas fa-plus-circle"></i>
                        <span>File New Case</span>
                    </a>
                </div>
                <div id="judge-only-links" class="hidden space-y-4">
                    <a href="schedule.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Smart Schedule</span>
                    </a>
                </div>
                <a href="summary.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                    <i class="fas fa-file-alt"></i>
                    <span>AI Summarizer</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Case Repository</h2>
                <div class="flex items-center space-x-4">
                    <button id="btnAddCase" class="hidden bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition" onclick="window.location.href='add-case.html'">
                        <i class="fas fa-plus mr-2"></i>Add New Case
                    </button>
                    <div class="flex items-center space-x-2 text-slate-600 border-l pl-4">
                        <img id="userProfileImg" src="" class="w-8 h-8 rounded-full" alt="User Profile">
                        <button onclick="logout()" class="text-slate-400 hover:text-red-600 p-2 transition">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Case Filter -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 mb-8 flex flex-wrap gap-4 items-center">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-sm font-medium text-slate-600 mb-1">Search Cases</label>
                    <input type="text" id="caseSearch" class="w-full border border-slate-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Case ID or Type...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Priority</label>
                    <select id="priorityFilter" class="border border-slate-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="">All Priorities</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Case Type</label>
                    <select id="typeFilter" class="border border-slate-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="">All Types</option>
                        <option value="Criminal">Criminal</option>
                        <option value="Civil">Civil</option>
                        <option value="Family">Family</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Traffic">Traffic</option>
                    </select>
                </div>
            </div>

            <!-- Case Table -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm">Case ID</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm">Type</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm">Category</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm">Filing Date</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm text-center">Priority</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm text-center">AI Predicted Duration</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm">Status</th>
                            <th class="px-6 py-4 font-bold text-slate-600 text-sm text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="caseTableBody" class="divide-y divide-slate-100">
                        <!-- Case rows will be populated here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Decision modal (Judges) -->
    <div id="decisionModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-2xl w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">Upload decision</h3>
                <button id="aiSuggestBtn" onclick="getAiSuggestion()" class="bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-200 transition flex items-center space-x-1">
                    <i class="fas fa-robot"></i>
                    <span>AI Suggestion</span>
                </button>
            </div>
            <p class="text-sm text-slate-500 mb-2" id="decisionCaseLabel"></p>
            
            <div id="aiSuggestionBox" class="hidden mb-4 p-3 bg-indigo-50 border border-indigo-100 rounded-lg max-h-48 overflow-y-auto text-xs text-indigo-800 italic">
                <div class="font-bold mb-1 flex items-center"><i class="fas fa-brain mr-1"></i> AI Recommendation:</div>
                <div id="aiSuggestionText" class="whitespace-pre-wrap"></div>
            </div>

            <textarea id="decisionText" rows="6" class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" placeholder="Judgment summary / orders"></textarea>
            <div class="flex justify-end gap-2 mt-4">
                <button type="button" onclick="closeDecisionModal()" class="px-4 py-2 rounded-lg border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition">Cancel</button>
                <button type="button" onclick="submitDecision()" class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-bold hover:bg-indigo-700 transition">Submit Decision</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';
        let allCases = [];
        let currentUser = null;
        let decisionCaseId = null;

        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            document.getElementById('userProfileImg').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.full_name || user.username)}&background=random`;
            
            if (user.role === 'Judge') {
                document.getElementById('judge-only-links').classList.remove('hidden');
            }
            if (user.role === 'Lawyer') {
                document.getElementById('btnAddCase').classList.remove('hidden');
                document.getElementById('lawyer-only-nav').classList.remove('hidden');
            }

            fetchCases();
        });

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        document.getElementById('caseSearch').addEventListener('input', applyFilters);
        document.getElementById('priorityFilter').addEventListener('change', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);

        async function fetchCases() {
            try {
                const response = await fetch('http://localhost:5000/api/cases');
                allCases = await response.json();
                renderCases(allCases);
            } catch (error) {
                console.error('Error fetching cases:', error);
            }
        }

        function renderCases(cases) {
            const tbody = document.getElementById('caseTableBody');
            if (cases.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-slate-500 italic">No cases found matching your criteria.</td></tr>';
                return;
            }

            const isJudge = currentUser && currentUser.role === 'Judge';
            const approved = currentUser && currentUser.verification_status === 'Approved';

            tbody.innerHTML = cases.map(c => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="px-6 py-4 font-bold text-slate-800">${c.case_id}</td>
                    <td class="px-6 py-4 text-slate-600">${c.case_type}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 bg-indigo-50 text-indigo-700 text-xs rounded border border-indigo-100">${c.category}</span>
                    </td>
                    <td class="px-6 py-4 text-slate-600">${c.filing_date}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 text-xs font-bold rounded-full uppercase ${getPriorityClass(c.priority)}">
                            ${c.priority}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center space-x-1">
                            <i class="fas fa-clock text-indigo-400 text-xs"></i>
                            <span class="font-medium text-slate-700">${c.predicted_duration} Days</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="flex items-center space-x-2">
                            <span class="w-2 h-2 rounded-full bg-orange-400"></span>
                            <span class="text-sm font-medium text-slate-600">${c.status}</span>
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">
                        <button type="button" onclick="showCaseHistory('${c.case_id}')" class="text-slate-400 hover:text-indigo-600 p-2 transition" title="History"><i class="fas fa-history"></i></button>
                        ${isJudge && c.status === 'Pending' && approved ? `<button type="button" onclick="openDecisionModal('${c.case_id}')" class="text-indigo-600 hover:text-indigo-800 p-2 font-bold text-xs">Decision</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        async function showCaseHistory(caseId) {
            try {
                const r = await fetch(API + '/api/cases/' + encodeURIComponent(caseId) + '/history');
                const h = await r.json();
                const lines = h.length ? h.map(x => `${x.event_type} @ ${x.created_at}\n${JSON.stringify(x.details)}`).join('\n\n') : 'No history yet.';
                alert('Case ' + caseId + '\n\n' + lines);
            } catch (e) {
                alert('Could not load history');
            }
        }

        function openDecisionModal(caseId) {
            decisionCaseId = caseId;
            document.getElementById('decisionCaseLabel').textContent = caseId;
            document.getElementById('decisionText').value = '';
            document.getElementById('aiSuggestionBox').classList.add('hidden');
            document.getElementById('aiSuggestionText').textContent = '';
            document.getElementById('decisionModal').classList.remove('hidden');
        }

        async function getAiSuggestion() {
            if (!decisionCaseId) return;
            
            const btn = document.getElementById('aiSuggestBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Analyzing...</span>';

            try {
                const response = await fetch(API + '/api/ai/suggest-decision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ case_id: decisionCaseId })
                });
                
                const result = await response.json();
                if (result.error) throw new Error(result.error);

                document.getElementById('aiSuggestionBox').classList.remove('hidden');
                document.getElementById('aiSuggestionText').textContent = result.suggestion;
            } catch (err) {
                alert('AI Suggestion Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-robot"></i><span>AI Suggestion</span>';
            }
        }

        function closeDecisionModal() {
            decisionCaseId = null;
            document.getElementById('decisionModal').classList.add('hidden');
        }

        async function submitDecision() {
            if (!currentUser || !decisionCaseId) return;
            const body = {
                case_id: decisionCaseId,
                judge_id: currentUser.nyaya_id,
                decision: document.getElementById('decisionText').value
            };
            const r = await fetch(API + '/api/cases/decision', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const j = await r.json();
            if (!r.ok) {
                alert(j.error || 'Failed');
                return;
            }
            closeDecisionModal();
            fetchCases();
            alert('Decision recorded.');
        }

        function applyFilters() {
            const search = document.getElementById('caseSearch').value.toLowerCase();
            const priority = document.getElementById('priorityFilter').value;
            const type = document.getElementById('typeFilter').value;

            const filtered = allCases.filter(c => {
                const matchesSearch = c.case_id.toLowerCase().includes(search) || c.case_type.toLowerCase().includes(search);
                const matchesPriority = priority === '' || c.priority === priority;
                const matchesType = type === '' || c.case_type === type;
                return matchesSearch && matchesPriority && matchesType;
            });

            renderCases(filtered);
        }

        function getPriorityClass(priority) {
            switch(priority) {
                case 'High': return 'bg-red-100 text-red-600';
                case 'Medium': return 'bg-orange-100 text-orange-600';
                case 'Low': return 'bg-emerald-100 text-emerald-600';
                default: return 'bg-slate-100 text-slate-600';
            }
        }
    </script>
</body>
</html>
