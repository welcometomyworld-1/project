<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scheduling - SmartCourt AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block">
            <div class="flex items-center mb-8 space-x-2">
                <i class="fas fa-balance-scale text-2xl text-indigo-400"></i>
                <h1 class="text-xl font-bold tracking-tight">NyayaFlow AI</h1>
            </div>
            <nav class="space-y-4">
                <a href="index.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
                <a href="cases.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                    <i class="fas fa-folder"></i>
                    <span>Case Management</span>
                </a>
                <div id="judge-only-links" class="hidden space-y-4">
                    <a href="schedule.html" class="flex items-center space-x-3 p-3 bg-indigo-600 rounded-lg">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Smart Schedule</span>
                    </a>
                </div>
                <a href="summary.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-lg transition">
                    <i class="fas fa-file-alt"></i>
                    <span>AI Summarizer</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <header class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800">AI-Optimized Hearing Schedule</h2>
                <p class="text-slate-500 mt-2">Automatically suggest hearing dates based on case priority, urgency, and judicial workload.</p>
            </header>

            <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <div class="flex items-center space-x-4">
                        <h3 class="text-lg font-bold">Suggested Hearing Dates</h3>
                        <div class="flex bg-slate-100 p-1 rounded-lg">
                            <button class="px-4 py-1 bg-white shadow-sm rounded-md text-sm font-bold text-indigo-600">List View</button>
                            <button class="px-4 py-1 text-sm font-bold text-slate-500 hover:text-slate-700">Calendar View</button>
                        </div>
                    </div>
                    <button id="optimizeBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 shadow-md shadow-indigo-100 transition flex items-center font-bold">
                        <i class="fas fa-sync-alt mr-2"></i>AI Optimization
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="scheduleList">
                    <!-- Schedule items will be populated here -->
                </div>
            </div>

            <!-- Judicial Workload -->
            <div class="bg-white p-8 rounded-xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-bold mb-6">Judicial Workload Heatmap</h3>
                <div class="grid grid-cols-7 gap-2" id="heatmapGrid">
                    <!-- Heatmap populated via JS -->
                </div>
                <div class="mt-6 flex items-center space-x-4 text-sm text-slate-500">
                    <div class="flex items-center"><span class="w-3 h-3 bg-slate-100 rounded-sm mr-2"></span> Low Load</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-indigo-300 rounded-sm mr-2"></span> Medium Load</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-indigo-500 rounded-sm mr-2"></span> High Load</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            if (user.role !== 'Judge') {
                alert('Access Denied: Judges only.');
                window.location.href = 'index.html';
                return;
            }
            if (user.verification_status !== 'Approved') {
                alert('Your judge account must be approved to use scheduling tools.');
                window.location.href = 'index.html';
                return;
            }
            // RBAC
            document.getElementById('judge-only-links').classList.remove('hidden');
            
            fetchSchedule();
            renderHeatmap();
        });

        function renderHeatmap() {
            const grid = document.getElementById('heatmapGrid');
            let html = '';
            for (let i = 0; i < 35; i++) {
                const loadClass = i % 5 === 0 ? 'bg-indigo-500 text-white' : (i % 3 === 0 ? 'bg-indigo-300 text-white' : 'bg-slate-100 text-slate-400');
                html += `
                    <div class="h-16 rounded-lg ${loadClass} flex items-center justify-center text-xs font-bold shadow-sm border border-slate-200">
                        Day ${i + 1}
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        document.getElementById('optimizeBtn').addEventListener('click', fetchSchedule);

        async function fetchSchedule() {
            const list = document.getElementById('scheduleList');
            list.innerHTML = '<div class="col-span-full py-12 text-center text-slate-500"><i class="fas fa-spinner fa-spin text-3xl mb-4 text-indigo-500 block"></i>AI is optimizing your schedule...</div>';

            try {
                const response = await fetch('http://localhost:5000/api/schedule');
                const schedule = await response.json();
                
                if (schedule.length === 0) {
                    list.innerHTML = '<div class="col-span-full py-12 text-center text-slate-500 italic">No pending cases to schedule.</div>';
                    return;
                }

                list.innerHTML = schedule.map(s => `
                    <div class="bg-slate-50 p-6 rounded-xl border border-slate-100 hover:shadow-md transition">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-slate-800">${s.case_id}</h4>
                                <span class="text-xs font-bold uppercase ${getPriorityClass(s.priority)}">${s.priority} Priority</span>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-indigo-600 uppercase">Suggested Date</p>
                                <p class="font-bold text-slate-800">${formatDate(s.suggested_date)}</p>
                            </div>
                        </div>
                        <div class="flex space-x-2 mt-4">
                            <button class="flex-1 py-2 bg-white border border-slate-200 rounded-lg text-sm font-bold text-slate-600 hover:bg-slate-50 transition">Reschedule</button>
                            <button class="flex-1 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold hover:bg-indigo-700 transition">Confirm</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching schedule:', error);
                list.innerHTML = '<div class="col-span-full py-12 text-center text-red-500 italic">Failed to fetch schedule. Check backend connection.</div>';
            }
        }

        function getPriorityClass(priority) {
            switch(priority) {
                case 'High': return 'text-red-600';
                case 'Medium': return 'text-orange-600';
                case 'Low': return 'text-emerald-600';
                default: return 'text-slate-600';
            }
        }

        function formatDate(dateStr) {
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
            return new Date(dateStr).toLocaleDateString(undefined, options);
        }
    </script>
</body>
</html>
